<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#1a1a2e"/>
  <!-- Clock face -->
  <circle cx="32" cy="32" r="24" fill="#ffffff" opacity="0.08"/>
  <circle cx="32" cy="32" r="22" fill="none" stroke="#6c63ff" stroke-width="2.5"/>
  <!-- Hour markers -->
  <line x1="32" y1="12" x2="32" y2="16" stroke="#6c63ff" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="48" x2="32" y2="52" stroke="#6c63ff" stroke-width="2" stroke-linecap="round"/>
  <line x1="12" y1="32" x2="16" y2="32" stroke="#6c63ff" stroke-width="2" stroke-linecap="round"/>
  <line x1="48" y1="32" x2="52" y2="32" stroke="#6c63ff" stroke-width="2" stroke-linecap="round"/>
  <!-- Minor markers -->
  <line x1="44.5" y1="14.5" x2="42.8" y2="17.5" stroke="#6c63ff" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="49.5" y1="19.5" x2="46.5" y2="21.2" stroke="#6c63ff" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="19.5" y1="14.5" x2="21.2" y2="17.5" stroke="#6c63ff" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="14.5" y1="19.5" x2="17.5" y2="21.2" stroke="#6c63ff" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="49.5" y1="44.5" x2="46.5" y2="42.8" stroke="#6c63ff" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="44.5" y1="49.5" x2="42.8" y2="46.5" stroke="#6c63ff" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="14.5" y1="44.5" x2="17.5" y2="42.8" stroke="#6c63ff" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="19.5" y1="49.5" x2="21.2" y2="46.5" stroke="#6c63ff" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <!-- Hour hand (pointing to ~10) -->
  <line x1="32" y1="32" x2="22" y2="22" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <!-- Minute hand (pointing to ~2) -->
  <line x1="32" y1="32" x2="40" y2="18" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Second hand accent -->
  <line x1="32" y1="32" x2="36" y2="44" stroke="#ff6584" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="3" fill="#6c63ff"/>
  <circle cx="32" cy="32" r="1.5" fill="#ffffff"/>
</svg>
